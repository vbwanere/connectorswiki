<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connectors Wiki — an open electrical connector reference</title>
<meta name="description" content="Open, community-maintained reference of electrical connectors: ratings, pitch, pin counts, standards, and to-scale footprint drawings.">
<style>
  :root{
    --paper:#f6f7f4; --card:#ffffff; --rule:#d8dcd4; --rule2:#e8ebe5;
    --ink:#171b1e; --ink2:#4a5359; --faint:#8b949a;
    --blue:#1857a4; --blue-soft:#e8f0fa;
    --amber:#a8621a; --red:#b4322c; --green:#2f7d4f;
    --mono:ui-monospace,"SFMono-Regular","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}

  /* faint drafting grid on the page background */
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5;
    background-image:linear-gradient(var(--rule2) 1px,transparent 1px),linear-gradient(90deg,var(--rule2) 1px,transparent 1px);
    background-size:22px 22px}

  header{border-bottom:1px solid var(--rule);background:rgba(246,247,244,.94);backdrop-filter:blur(6px);position:sticky;top:0;z-index:20}
  .bar{max-width:1400px;margin:0 auto;padding:13px 20px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .logo{font-family:var(--mono);font-weight:700;font-size:17px;letter-spacing:-.4px;white-space:nowrap}
  .logo em{font-style:normal;color:var(--blue)}
  .tag{color:var(--faint);font-size:12px;font-family:var(--mono)}
  .grow{flex:1}
  .ghlink{border:1px solid var(--rule);background:var(--card);padding:6px 12px;border-radius:6px;color:var(--ink2);font-size:12.5px;font-family:var(--mono);align-self:center}
  .ghlink:hover{border-color:var(--blue);color:var(--blue);text-decoration:none}

  .controls{max-width:1400px;margin:0 auto;padding:12px 20px 6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search{flex:1;min-width:250px;position:relative}
  .search input{width:100%;background:var(--card);border:1px solid var(--rule);color:var(--ink);
    padding:10px 14px 10px 36px;border-radius:7px;font-size:14px;font-family:var(--sans);outline:none}
  .search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  .search svg{position:absolute;left:12px;top:11px;width:15px;height:15px;stroke:var(--faint);fill:none}
  select{background:var(--card);border:1px solid var(--rule);color:var(--ink);padding:9px 11px;border-radius:7px;font-size:13px;outline:none;cursor:pointer}
  select:focus{border-color:var(--blue)}
  .count{color:var(--faint);font-family:var(--mono);font-size:12px;white-space:nowrap}

  .chips{max-width:1400px;margin:0 auto;padding:4px 20px 12px;display:flex;gap:7px;flex-wrap:wrap}
  .chip{border:1px solid var(--rule);background:var(--card);color:var(--ink2);padding:5px 11px;border-radius:20px;
    font-size:12.5px;font-family:var(--mono);cursor:pointer;user-select:none}
  .chip:hover{border-color:var(--blue);color:var(--blue)}
  .chip.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}

  main{max-width:1400px;margin:0 auto;padding:4px 20px 60px}
  .tablewrap{border:1px solid var(--rule);border-radius:9px;overflow:auto;background:var(--card)}
  table{border-collapse:collapse;width:100%;min-width:1040px}
  thead th{position:sticky;top:0;background:#f0f2ee;text-align:left;font-size:10.5px;letter-spacing:.6px;
    text-transform:uppercase;color:var(--ink2);padding:10px 12px;border-bottom:1px solid var(--rule);white-space:nowrap;cursor:pointer;user-select:none;z-index:2}
  thead th:hover{color:var(--blue)}
  thead th .ar{color:var(--blue);font-size:9px}
  tbody tr{border-bottom:1px solid var(--rule2);cursor:pointer}
  tbody tr:hover{background:#fafbf8}
  tbody tr.open{background:var(--blue-soft)}
  td{padding:9px 12px;vertical-align:top;font-size:13px}
  td.name{font-weight:600;white-space:nowrap}
  td.mono{font-family:var(--mono);color:var(--ink2);white-space:nowrap;font-size:12.5px}
  td.app{color:var(--ink2);max-width:230px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .badge{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid;white-space:nowrap}
  .b-legacy{color:var(--red);border-color:#e6bcba;background:#fdf2f1}
  .b-dec{color:var(--amber);border-color:#e8cfae;background:#fdf6ec}
  .b-cur{color:var(--green);border-color:#b9dcc6;background:#f0f8f3}
  .hasdraw{color:var(--blue);font-family:var(--mono);font-size:10px}

  /* ---- detail ---- */
  .detail td{background:#fbfcfa;padding:0;border-bottom:2px solid var(--rule)}
  .dwrap{display:grid;grid-template-columns:minmax(300px,420px) 1fr;gap:0}
  @media(max-width:900px){.dwrap{grid-template-columns:1fr}}
  .drawpane{border-right:1px solid var(--rule2);padding:16px 18px}
  @media(max-width:900px){.drawpane{border-right:none;border-bottom:1px solid var(--rule2)}}
  .drawhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .drawhead .t{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
  .pinsel{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px;color:var(--ink2)}
  .pinsel input{width:110px;accent-color:var(--blue)}
  .pinsel b{color:var(--blue);min-width:18px;display:inline-block;text-align:right}
  .canvas{background:var(--card);border:1px solid var(--rule);border-radius:6px;padding:10px;overflow:hidden}
  .canvas svg{display:block;width:100%;height:auto}
  .noimg{background:var(--card);border:1px dashed var(--rule);border-radius:6px;padding:26px 16px;text-align:center;color:var(--faint);font-size:12.5px}
  .noimg b{display:block;color:var(--ink2);margin-bottom:5px;font-size:13px}
  .noimg a{font-family:var(--mono);font-size:12px}
  .scalenote{margin-top:7px;font-family:var(--mono);font-size:10.5px;color:var(--faint);text-align:center}

  .fields{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px 24px;align-content:start}
  .field .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-family:var(--mono);margin-bottom:2px}
  .field .v{font-size:13.5px}
  .field.wide{grid-column:1/-1}
  .field.wide .v{color:var(--ink2)}
  .dslink{grid-column:1/-1;padding-top:4px;border-top:1px dashed var(--rule);margin-top:4px}

  .empty{padding:56px 20px;text-align:center;color:var(--faint)}
  .empty b{color:var(--ink);display:block;margin-bottom:5px;font-size:15px}

  footer{border-top:1px solid var(--rule);color:var(--faint);font-size:12.5px;background:var(--card)}
  .fbar{max-width:1400px;margin:0 auto;padding:20px;display:flex;gap:18px;flex-wrap:wrap;justify-content:space-between;align-items:center}
  .fbar a{font-family:var(--mono)}
</style>
</head>
<body>
<header>
  <div class="bar">
    <span class="logo">connectors<em>wiki</em></span>
    <span class="tag">// open reference · ratings · pitch · to-scale footprints</span>
    <span class="grow"></span>
    <a class="ghlink" id="ghtop" href="#">Contribute on GitHub</a>
  </div>
  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Search name, family, use case, standard, notes…" autocomplete="off">
    </div>
    <select id="sub"><option value="">All subcategories</option></select>
    <select id="leg">
      <option value="">Status: all</option>
      <option value="current">Current only</option>
      <option value="declining">Declining only</option>
      <option value="legacy">Legacy only</option>
    </select>
    <select id="drw">
      <option value="">Drawing: any</option>
      <option value="yes">Has drawing</option>
      <option value="no">Needs a drawing</option>
    </select>
    <span class="count" id="count">—</span>
  </div>
  <div class="chips" id="chips"></div>
</header>

<main>
  <div class="tablewrap">
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="body"></tbody>
    </table>
  </div>
  <div class="empty" id="empty" style="display:none">
    <b>Nothing matches that filter.</b>
    Clear the search or pick a different category.
  </div>
</main>

<footer>
  <div class="fbar">
    <span id="fcount">Loading…</span>
    <span>Missing a part, a drawing, or a datasheet link? <a id="ghbot" href="#">Open an issue or a pull request →</a></span>
  </div>
</footer>

<script>
const REPO = "vbwanere/connectorswiki";
document.querySelectorAll("#ghtop,#ghbot").forEach(a=>a.href="https://github.com/"+REPO);

const COLS=[
  {k:"name",label:"Connector",cls:"name"},
  {k:"family",label:"Family",cls:"mono"},
  {k:"application",label:"Application",cls:"app"},
  {k:"voltage",label:"Voltage",cls:"mono"},
  {k:"current",label:"Current",cls:"mono"},
  {k:"pins",label:"Pins",cls:"mono"},
  {k:"pitch",label:"Pitch mm",cls:"mono"},
  {k:"tempRange",label:"Temp °C",cls:"mono"},
  {k:"legacy",label:"Status",cls:"mono"},
];
const CATS=["Power","Signal - Low Speed","Signal - High Speed","RF / Fiber / Specialty","Specialty - Extreme","PCB"];
let DATA=[],view=[],sortKey="name",sortDir=1,activeCat="";
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

fetch("data/connectors.json").then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
 .then(d=>{DATA=d;init()})
 .catch(e=>{$("#body").innerHTML=`<tr><td colspan="9" class="empty"><b>Couldn't load data/connectors.json</b>${e}</td></tr>`});

function status(raw){
  const s=(raw||"").trim().toLowerCase();
  if(!s||s.startsWith("no"))return{cls:"current",label:"CURRENT",badge:"b-cur"};
  if(/^(declin|becoming|partial|transition|pxi legacy)/.test(s)||s.includes("replacing")||s.includes("migrating"))
    return{cls:"declining",label:"DECLINING",badge:"b-dec"};
  return{cls:"legacy",label:"LEGACY",badge:"b-legacy"};
}

function init(){
  $("#head").innerHTML=COLS.map(c=>`<th data-k="${c.k}">${c.label} <span class="ar" data-ar="${c.k}"></span></th>`).join("");
  $("#head").querySelectorAll("th").forEach(th=>th.onclick=()=>setSort(th.dataset.k));
  $("#chips").innerHTML=`<span class="chip on" data-cat="">All · ${DATA.length}</span>`+
    CATS.map(c=>`<span class="chip" data-cat="${c}">${c} · ${DATA.filter(x=>x.category===c).length}</span>`).join("");
  $("#chips").querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{
    activeCat=ch.dataset.cat;
    $("#chips").querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===ch));
    fillSub();render();
  });
  ["#q","#sub","#leg","#drw"].forEach(s=>{const el=$(s);el.oninput=render;el.onchange=render;});
  fillSub();render();
  const withDraw=DATA.filter(x=>x.geom).length;
  $("#fcount").textContent=`${DATA.length} connectors · ${withDraw} with generated to-scale drawings · ${DATA.length-withDraw} awaiting a drawing`;
}
function fillSub(){
  const pool=activeCat?DATA.filter(x=>x.category===activeCat):DATA;
  const subs=[...new Set(pool.map(x=>x.subcategory).filter(Boolean))].sort();
  $("#sub").innerHTML='<option value="">All subcategories</option>'+subs.map(s=>`<option>${esc(s)}</option>`).join("");
}
function setSort(k){sortKey===k?sortDir*=-1:(sortKey=k,sortDir=1);render();}

function render(){
  const q=$("#q").value.trim().toLowerCase(),sub=$("#sub").value,leg=$("#leg").value,drw=$("#drw").value;
  view=DATA.filter(x=>{
    if(activeCat&&x.category!==activeCat)return false;
    if(sub&&x.subcategory!==sub)return false;
    if(leg&&status(x.legacy).cls!==leg)return false;
    if(drw==="yes"&&!x.geom)return false;
    if(drw==="no"&&x.geom)return false;
    if(q){
      const hay=(x.name+" "+x.family+" "+x.application+" "+x.useCases+" "+x.standard+" "+x.notes+" "+x.subcategory).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  view.sort((a,b)=>{
    const A=(a[sortKey]||"").toString(),B=(b[sortKey]||"").toString();
    const nA=parseFloat(A),nB=parseFloat(B);
    if(!isNaN(nA)&&!isNaN(nB)&&!A.replace(/[\d.\s]/g,"")&&!B.replace(/[\d.\s]/g,""))return (nA-nB)*sortDir;
    return A.localeCompare(B)*sortDir;
  });
  paint();
}
function paint(){
  $("#count").textContent=view.length+" shown";
  $("#empty").style.display=view.length?"none":"block";
  document.querySelectorAll(".ar").forEach(s=>s.textContent="");
  const ar=document.querySelector("[data-ar='"+sortKey+"']");if(ar)ar.textContent=sortDir>0?"▲":"▼";
  $("#body").innerHTML=view.map((x,i)=>{
    const st=status(x.legacy);
    return "<tr data-i='"+i+"'>"+COLS.map(c=>{
      if(c.k==="legacy")return `<td class="mono"><span class="badge ${st.badge}" title="${esc(x.legacy||"")}">${st.label}</span></td>`;
      if(c.k==="name")return `<td class="name">${esc(x.name)} ${x.geom?'<span class="hasdraw" title="to-scale drawing available">◱</span>':''}</td>`;
      return `<td class="${c.cls}">${esc(x[c.k]||"—")}</td>`;
    }).join("")+"</tr>";
  }).join("");
  $("#body").querySelectorAll("tr").forEach(tr=>tr.onclick=()=>toggle(tr));
}

function toggle(tr){
  const i=+tr.dataset.i,x=view[i],nx=tr.nextElementSibling;
  document.querySelectorAll("tr.open").forEach(t=>t.classList.remove("open"));
  if(nx&&nx.classList.contains("detail")){nx.remove();return;}
  document.querySelectorAll(".detail").forEach(d=>d.remove());
  tr.classList.add("open");
  const f=(k,l)=>x[k]&&x[k]!=="—"?`<div class="field"><div class="k">${l}</div><div class="v">${esc(x[k])}</div></div>`:"";
  const w=(k,l)=>x[k]&&x[k]!=="—"?`<div class="field wide"><div class="k">${l}</div><div class="v">${esc(x[k])}</div></div>`:"";
  const ds=x.datasheet
    ? `<div class="field dslink"><div class="k">Datasheet</div><div class="v"><a href="${esc(x.datasheet)}" target="_blank" rel="noopener">${esc(x.datasheet)}</a></div></div>`
    : `<div class="field dslink"><div class="k">Datasheet</div><div class="v"><a href="https://github.com/${REPO}/edit/main/data/connectors.json" target="_blank" rel="noopener">Add a datasheet link →</a></div></div>`;
  const html=`<tr class="detail"><td colspan="${COLS.length}"><div class="dwrap">
    <div class="drawpane" id="dp"></div>
    <div class="fields">
      ${f("category","Category")}${f("subcategory","Subcategory")}${f("pitch","Pitch (mm)")}
      ${f("pins","Pin count")}${f("maxLength","Max recommended length")}${f("standard","Relevant standard")}
      ${f("locking","Locking mechanism")}
      ${w("useCases","Typical use cases")}${w("notes","Notes")}${ds}
    </div></div></td></tr>`;
  tr.insertAdjacentHTML("afterend",html);
  drawPane(tr.nextElementSibling.querySelector("#dp"),x);
}

/* ================= DRAWING ENGINE =================
   All drawings are generated from published dimensional data
   (pitch, pin count, row count) — original vector output, to scale. */
function drawPane(el,x){
  const g=x.geom;
  if(x.image){
    el.innerHTML=`<div class="drawhead"><span class="t">Mating face · contributed drawing</span></div>
      <div class="canvas"><img src="${esc(x.image)}" alt="${esc(x.name)} mating face" style="width:100%;height:auto;display:block"></div>
      <div class="scalenote">Original SVG — see CONTRIBUTING.md for drawing conventions.</div>`;
    return;
  }
  if(!g){
    el.innerHTML=`<div class="drawhead"><span class="t">Mating face</span></div>
      <div class="noimg"><b>No drawing yet</b>
      This connector's geometry isn't derivable from pitch alone.<br>
      <a href="https://github.com/${REPO}/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">Contribute an SVG drawing →</a></div>`;
    return;
  }
  if(g.draw==="header"){
    const min=g.pinMin,max=Math.max(g.pinMax,g.pinMin);
    el.innerHTML=`<div class="drawhead"><span class="t">Footprint · to scale</span>
      <span class="pinsel">pins <input type="range" min="${min}" max="${max}" value="${Math.min(min+2,max)}" id="pr"><b id="pv"></b></span></div>
      <div class="canvas" id="cv"></div><div class="scalenote" id="sn"></div>`;
    const pr=el.querySelector("#pr");
    const upd=()=>{
      const n=+pr.value;el.querySelector("#pv").textContent=n;
      el.querySelector("#cv").innerHTML=svgHeader(g.pitch,n,g.rows);
      el.querySelector("#sn").textContent=`pitch ${g.pitch} mm · ${n} way${g.rows>1?" · 2 rows":""} · pin-1 span ${( (Math.ceil(n/g.rows)-1)*g.pitch ).toFixed(2)} mm`;
    };
    pr.oninput=upd;upd();
  } else if(g.draw==="circular"){
    const min=g.pinMin,max=Math.max(g.pinMax,g.pinMin);
    el.innerHTML=`<div class="drawhead"><span class="t">Mating face · pin pattern</span>
      ${max>min?`<span class="pinsel">pins <input type="range" min="${min}" max="${max}" value="${min}" id="pr"><b id="pv"></b></span>`:`<span class="pinsel"><b>${min}</b> pins</span>`}</div>
      <div class="canvas" id="cv"></div>
      <div class="scalenote">Pin arrangement is indicative — check the datasheet for keying and pin numbering.</div>`;
    const pr=el.querySelector("#pr");
    const upd=()=>{const n=pr?+pr.value:min;if(pr)el.querySelector("#pv").textContent=n;
      el.querySelector("#cv").innerHTML=svgCircular(n);};
    if(pr)pr.oninput=upd;upd();
  } else if(g.draw==="dsub"){
    el.innerHTML=`<div class="drawhead"><span class="t">Mating face · D-subminiature</span><span class="pinsel"><b>${g.pins}</b> pins</span></div>
      <div class="canvas">${svgDsub(g.pins)}</div>
      <div class="scalenote">Two-row staggered layout, 2.77 mm pitch (standard density).</div>`;
  } else if(g.draw==="blade"){
    el.innerHTML=`<div class="drawhead"><span class="t">Mating face</span><span class="pinsel"><b>${g.pins}</b> contacts</span></div>
      <div class="canvas">${svgBlade(g.pins)}</div>
      <div class="scalenote">Bullet/blade contact layout — indicative, not to scale.</div>`;
  }
}

/* to-scale linear header footprint with dimension line */
function svgHeader(pitch,n,rows){
  const perRow=Math.ceil(n/rows), span=(perRow-1)*pitch;
  const S=Math.min(14,Math.max(4,220/Math.max(span,6)));  // px per mm
  const half=pitch*S*0.5;                 // half the body height
  const padX=42, padY=half+26, rowGap=pitch*S;   // padY must clear the span dimension + its label
  const W=span*S+padX*2, H=padY+(rows-1)*rowGap+half+34;
  const pin=Math.max(2.6,Math.min(5,pitch*S*0.26));
  let s=`<svg viewBox="0 0 ${W.toFixed(0)} ${H.toFixed(0)}" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,monospace">`;
  // body outline
  const bx=padX-pitch*S*0.5, by=padY-pitch*S*0.5, bw=span*S+pitch*S, bh=(rows-1)*rowGap+pitch*S;
  s+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="#eef2f7" stroke="#1857a4" stroke-width="1.2"/>`;
  for(let r=0;r<rows;r++)for(let i=0;i<perRow;i++){
    const idx=r*perRow+i; if(idx>=n)break;
    const cx=padX+i*pitch*S, cy=padY+r*rowGap;
    if(idx===0) s+=`<rect x="${(cx-pin).toFixed(1)}" y="${(cy-pin).toFixed(1)}" width="${(pin*2).toFixed(1)}" height="${(pin*2).toFixed(1)}" fill="#1857a4"/>`;
    else s+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${pin.toFixed(1)}" fill="#fff" stroke="#1857a4" stroke-width="1.1"/>`;
  }
  // dimension line for pitch (first gap)
  if(perRow>1){
    const y=padY+(rows-1)*rowGap+pitch*S*0.5+15, x1=padX, x2=padX+pitch*S;
    s+=`<g stroke="#a8621a" stroke-width=".9"><path d="M${x1} ${y-4}V${y+4}M${x2} ${y-4}V${y+4}M${x1} ${y}H${x2}"/></g>`;
    s+=`<text x="${((x1+x2)/2).toFixed(1)}" y="${(y-6).toFixed(1)}" font-size="9.5" fill="#a8621a" text-anchor="middle">${pitch}</text>`;
  }
  // overall span dimension
  if(span>0){
    const y=padY-pitch*S*0.5-12;
    s+=`<g stroke="#4a5359" stroke-width=".8"><path d="M${padX} ${y-4}V${y+4}M${padX+span*S} ${y-4}V${y+4}M${padX} ${y}H${padX+span*S}"/></g>`;
    s+=`<text x="${(padX+span*S/2).toFixed(1)}" y="${(y-5).toFixed(1)}" font-size="9.5" fill="#4a5359" text-anchor="middle">${span.toFixed(2)} mm</text>`;
  }
  s+=`<text x="${padX}" y="${(padY+ (rows-1)*rowGap + pitch*S*0.5 + 30).toFixed(1)}" font-size="9" fill="#8b949a" text-anchor="middle">pin 1</text>`;
  return s+`</svg>`;
}

/* circular connector mating face — pins on concentric rings */
function svgCircular(n){
  const R=74,W=210,H=180,cx=W/2,cy=H/2;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,monospace">`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="#eef2f7" stroke="#1857a4" stroke-width="1.4"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${R-9}" fill="none" stroke="#1857a4" stroke-width=".6" stroke-dasharray="3 3"/>`;
  // keyway
  s+=`<path d="M${cx-7} ${cy-R+1} h14 l-3 9 h-8 z" fill="#1857a4"/>`;
  // ring allocation
  let rings=[];
  if(n<=1)rings=[[1,0]]; else if(n<=7)rings=[[1,0],[n-1,R-24]];
  else if(n<=12)rings=[[Math.min(4,n-8),0],[n-Math.min(4,n-8),R-24]];
  else rings=[[3,0],[Math.round((n-3)*0.4),R-40],[n-3-Math.round((n-3)*0.4),R-22]];
  let idx=1;
  rings.forEach(([cnt,rad])=>{
    for(let i=0;i<cnt;i++){
      const a=(i/cnt)*Math.PI*2-Math.PI/2+(rad?0.25:0);
      const px=rad?cx+rad*Math.cos(a):(cnt===1?cx:cx+18*Math.cos(a));
      const py=rad?cy+rad*Math.sin(a):(cnt===1?cy:cy+18*Math.sin(a));
      s+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="7" fill="#fff" stroke="#1857a4" stroke-width="1.1"/>`;
      s+=`<text x="${px.toFixed(1)}" y="${(py+3.2).toFixed(1)}" font-size="7.5" fill="#4a5359" text-anchor="middle">${idx++}</text>`;
    }
  });
  return s+`</svg>`;
}

/* D-sub mating face — two staggered rows in a D shell */
function svgDsub(n){
  const top=Math.ceil(n/2),bot=n-top,P=13,W=Math.max(200,top*P+62),H=86,cx=W/2,cy=H/2;
  const sw=top*P+30,sh=40;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,monospace">`;
  s+=`<path d="M${cx-sw/2+7} ${cy-sh/2} H${cx+sw/2-7} L${cx+sw/2-13} ${cy+sh/2} H${cx-sw/2+13} Z" fill="#eef2f7" stroke="#1857a4" stroke-width="1.3"/>`;
  const row=(cnt,y,start)=>{const x0=cx-((cnt-1)*P)/2;
    for(let i=0;i<cnt;i++){const px=x0+i*P;
      s+=`<circle cx="${px.toFixed(1)}" cy="${y}" r="4" fill="#fff" stroke="#1857a4" stroke-width="1"/>`;
      s+=`<text x="${px.toFixed(1)}" y="${y-7}" font-size="6.5" fill="#8b949a" text-anchor="middle">${start+i}</text>`;}};
  row(top,cy-8,1);row(bot,cy+10,top+1);
  return s+`</svg>`;
}

/* blade / bullet style */
function svgBlade(n){
  const W=200,H=100,cy=H/2,gap=44,x0=W/2-((n-1)*gap)/2;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,monospace">`;
  s+=`<rect x="${W/2-((n-1)*gap)/2-26}" y="${cy-27}" width="${(n-1)*gap+52}" height="54" rx="5" fill="#eef2f7" stroke="#1857a4" stroke-width="1.3"/>`;
  for(let i=0;i<n;i++){const px=x0+i*gap;
    s+=`<circle cx="${px}" cy="${cy}" r="15" fill="#fff" stroke="#1857a4" stroke-width="1.3"/>`;
    s+=`<circle cx="${px}" cy="${cy}" r="7" fill="${i===0?'#b4322c':'#1857a4'}"/>`;
    s+=`<text x="${px}" y="${cy+30}" font-size="8" fill="#8b949a" text-anchor="middle">${i===0?'+':'−'}</text>`;}
  return s+`</svg>`;
}
