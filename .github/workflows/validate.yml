name: Validate data
on:
  pull_request:
    paths: ["data/connectors.json"]
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: python scripts/validate.py
